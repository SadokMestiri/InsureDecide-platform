# ============================================================
#  InsureDecide — Docker Compose (Développement / PFE)
#  FIX : bases PostgreSQL séparées pour Airflow et MLflow
# ============================================================

networks:
  insuredecide_network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:
  qdrant_data:
  mlflow_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:

services:

  # ─────────────────────────────────────────
  # 1. BASE DE DONNÉES PRINCIPALE
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: insuredecide_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: insuredecide
      POSTGRES_USER: insuredecide_user
      POSTGRES_PASSWORD: insuredecide_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./init_databases.sh:/docker-entrypoint-initdb.d/02_create_dbs.sh
    networks:
      - insuredecide_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insuredecide_user -d insuredecide"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. MONGODB
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: insuredecide_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: insuredecide_user
      MONGO_INITDB_ROOT_PASSWORD: insuredecide_pass
      MONGO_INITDB_DATABASE: insuredecide
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 3. REDIS
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: insuredecide_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - insuredecide_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 4. MINIO
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: insuredecide_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: insuredecide_minio
      MINIO_ROOT_PASSWORD: insuredecide_minio_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - insuredecide_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # 5. QDRANT
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: insuredecide_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 6. CLICKHOUSE
  # ─────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: insuredecide_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9009:9009"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - insuredecide_network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ─────────────────────────────────────────
  # 7. AIRFLOW — base dédiée : airflow_db
  # ─────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.0
    container_name: insuredecide_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://insuredecide_user:insuredecide_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin123
    command: version
    networks:
      - insuredecide_network

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: insuredecide_airflow_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://insuredecide_user:insuredecide_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "insuredecide_airflow_secret_2024"
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    networks:
      - insuredecide_network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: insuredecide_airflow_scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://insuredecide_user:insuredecide_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 8. MLFLOW — base dédiée : mlflow_db
  # ─────────────────────────────────────────
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: insuredecide_mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: insuredecide_minio
      AWS_SECRET_ACCESS_KEY: insuredecide_minio_pass
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 9. PROMETHEUS
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: insuredecide_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 10. GRAFANA
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: insuredecide_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 11. BACKEND FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insuredecide_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://insuredecide_user:insuredecide_pass@postgres/insuredecide
      MONGODB_URL: mongodb://insuredecide_user:insuredecide_pass@mongodb:27017/insuredecide?authSource=admin
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: insuredecide_minio
      MINIO_SECRET_KEY: insuredecide_minio_pass
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      OLLAMA_HOST: http://host.docker.internal:11434
      AWS_ACCESS_KEY_ID: insuredecide_minio
      AWS_SECRET_ACCESS_KEY: insuredecide_minio_pass
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DENODO_URL: http://172.16.60.6:9090
      DENODO_USER: admin
      DENODO_PASSWORD: admin
      DENODO_DB: insuredecide
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./DataSets:/app/datasets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 12. CELERY WORKER
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insuredecide_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://insuredecide_user:insuredecide_pass@postgres/insuredecide
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insuredecide_network

  # ─────────────────────────────────────────
  # 14. FRONTEND Next.js
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insuredecide_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - insuredecide_network